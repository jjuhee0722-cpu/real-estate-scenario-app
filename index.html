<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f8fafc" />
    <meta
      name="description"
      content="부동산 주거 시나리오와 신생아 특례대출 대환을 비교하는 계산기"
    />
    <title>부동산 주거 시나리오 비교</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.css"
    />
    <script
      type="module"
      src="https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js"
    ></script>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #f8fafc;
      }

      streamlit-app {
        display: block;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <noscript>이 계산기를 사용하려면 브라우저에서 JavaScript를 허용해야 합니다.</noscript>
    <streamlit-app>
      <app-file name="app.py" url="./app.py" entrypoint></app-file>
      <app-file name="loan_logic.py" url="./loan_logic.py"></app-file>
      <app-file name="scenario_calculator.py" url="./scenario_calculator.py"></app-file>
      <app-file name="format_utils.py" url="./format_utils.py"></app-file>
      <app-requirements>pandas</app-requirements>
    </streamlit-app>
  </body>
</html>
